app = "census"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  GATUS_CONFIG_PATH = "/config/config.yaml"
  TZ = "Europe/Madrid"

[[mounts]]
  source = "gatus_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
