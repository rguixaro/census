storage:
    type: sqlite
    path: /data/gatus.db

ui:
    title: rguixaro.dev Status
    header: rguixaro.dev Status
    logo: ''
    link: 'https://rguixaro.dev'

endpoints:
    - name: Roots · Atrium
      group: rguixaro.dev
      url: https://roots.rguixaro.dev/api/health
      interval: 60s
      conditions:
          - '[STATUS] == 200'
          - '[RESPONSE_TIME] < 5000'

    - name: Cookbook · Receptarium
      group: rguixaro.dev
      url: https://cookbook.rguixaro.dev/api/health
      interval: 60s
      conditions:
          - '[STATUS] == 200'
          - '[RESPONSE_TIME] < 5000'

    - name: Rask · Itinerarium
      group: rguixaro.dev
      url: https://rask.rguixaro.dev/api/health
      interval: 60s
      conditions:
          - '[STATUS] == 200'
          - '[RESPONSE_TIME] < 5000'
